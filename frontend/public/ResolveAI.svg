<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Brand Gradient -->
    <linearGradient id="gradAI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"></stop>
      <stop offset="100%" stop-color="#8B5CF6"></stop>
    </linearGradient>

    <!-- Soft Glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="#0B0F1A"></rect>

  <!-- Gradient Ring -->
  <circle cx="64" cy="64" r="38" fill="none" stroke="url(#gradAI)" stroke-width="6" filter="url(#softGlow)" stroke-linecap="round"></circle>

  <!-- Inner Dot (AI Core) -->
  <circle cx="64" cy="64" r="10" fill="url(#gradAI)"></circle>

  <!-- Stylized R -->
  <path d="M44 88V40H70C82 40 88 46 88 54C88 61 83 65 76 67L88 88H78L67 69H54V88H44ZM54 60H70C76 60 80 57 80 54C80 51 76 48 70 48H54V60Z" fill="#FFFFFF"></path>
</svg>