<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResolveAI Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #10b981;
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    body::-webkit-scrollbar { display: none; }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: var(--primary);
      font-weight: 700; font-size: 15px; color: #fff; flex-shrink: 0;
    }
    .header-info { flex: 1; min-width: 0; }
    .header-name { font-weight: 700; font-size: 14px; color: var(--text); }
    .header-status { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; margin-top: 2px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; display: inline-block; }
    .close-btn {
      background: none; border: none; cursor: pointer; padding: 6px;
      color: var(--muted); border-radius: 8px; transition: background .15s, color .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:hover { background: rgba(255,255,255,.08); color: var(--text); }

    /* ── Messages ── */
    .messages {
      flex: 1; overflow-y: auto; padding: 16px 14px;
      display: flex; flex-direction: column; gap: 12px;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }
    .messages::-webkit-scrollbar { display: none; }

    .msg { display: flex; align-items: flex-end; gap: 8px; max-width: 86%; }
    .msg.bot, .msg.agent { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; flex-shrink: 0; font-weight: 700;
    }
    .msg.agent .msg-avatar { background: var(--primary); color: #fff; }

    .bubble {
      padding: 10px 14px; border-radius: 16px;
      font-size: 13.5px; line-height: 1.55;
      word-break: break-word;
    }
    .msg.bot .bubble, .msg.agent .bubble {
      background: var(--surface); border: 1px solid var(--border);
      border-bottom-left-radius: 4px; color: var(--text);
    }
    .msg.user .bubble {
      background: var(--primary); color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg-time { font-size: 10px; color: var(--muted); margin-top: 4px; padding: 0 4px; }
    .msg.user .msg-time { text-align: right; }

    /* ── Escalation banner ── */
    .escalation-banner {
      margin: 0 14px;
      background: rgba(16,185,129,.08);
      border: 1px solid rgba(16,185,129,.25);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 12px;
      color: #6ee7b7;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }

    /* ── Typing indicator ── */
    .typing { display: flex; align-items: center; gap: 4px; padding: 10px 14px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

    /* ── Input area ── */
    .input-area {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 12px 14px;
      display: flex; gap: 8px; align-items: flex-end;
      flex-shrink: 0;
    }
    textarea {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 13px; color: var(--text);
      font-size: 13px; font-family: inherit; resize: none;
      max-height: 100px; line-height: 1.5; outline: none;
      transition: border-color .2s;
      scrollbar-width: none;
    }
    textarea::-webkit-scrollbar { display: none; }
    textarea::placeholder { color: var(--muted); }
    textarea:focus { border-color: var(--primary); }

    .send-btn {
      width: 40px; height: 40px; border-radius: 50%; border: none;
      background: var(--primary); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform .15s, opacity .15s;
    }
    .send-btn:hover:not(:disabled) { transform: scale(1.07); }
    .send-btn:disabled { opacity: .45; cursor: not-allowed; }

    .powered {
      text-align: center; font-size: 10px; color: var(--muted);
      padding: 6px 0 8px; opacity: .6; flex-shrink: 0;
    }
  </style>
</head>
<body>

<script>
  // ── Parse URL params (Initial Fallbacks) ───────────────────────────────────
  var params = new URLSearchParams(window.location.search);
  var companyId = params.get("cid")   || "";
  var sessionId = params.get("sid")   || "";
  var API_BASE  = params.get("api")    || window.location.origin;
  var convId    = params.get("convId") || "";

  // Global settings state
  var currentBotName = "Support Bot";

  // ── Fetch Latest Settings from API (Ensures real-time updates) ─────────────
  fetch(API_BASE + "/api/company/widget-settings?cid=" + companyId)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        applySettings(data.settings);
      }
    })
    .catch(function(err) {
      applySettings({
        primaryColor: params.get("color") || "#10b981",
        botName: params.get("botName") || "Support Bot",
        welcomeMessage: params.get("welcome") || "Hi! How can I help you today?"
      });
    });

  function applySettings(settings) {
    var color = settings.primaryColor || "#10b981";
    currentBotName = settings.botName || "Support Bot";
    var welcome = settings.welcomeMessage || "Hi! How can I help you today?";

    document.documentElement.style.setProperty("--primary", color);
    document.getElementById("botNameEl").textContent = currentBotName;
    document.getElementById("avatarEl").textContent = currentBotName.charAt(0).toUpperCase();

    if (document.getElementById("messages").children.length === 0) {
      addBotMessage(welcome);
    }
  }
</script>

<div class="header">
  <div class="header-avatar" id="avatarEl">A</div>
  <div class="header-info">
    <div class="header-name" id="botNameEl">Support Bot</div>
    <div class="header-status"><span class="dot"></span> Online</div>
  </div>
  <button class="close-btn" onclick="closeWidget()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<div class="messages" id="messages"></div>
<div id="escalationBanner" style="display:none" class="escalation-banner">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
  Connected to live agent!
</div>

<div class="typing" id="typingEl" style="display:none">
  <span></span><span></span><span></span>
</div>

<div class="input-area">
  <textarea id="inputEl" placeholder="Type your message..." rows="1" onkeydown="handleKey(event)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<div class="powered">Powered by ResolveAI</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
  var currentConvId  = convId || null;
  var currentTicketId = null;
  var isEscalated    = false;
  var socket         = null;
  var messagesEl     = document.getElementById("messages");
  var inputEl        = document.getElementById("inputEl");
  var sendBtn        = document.getElementById("sendBtn");
  var typingEl       = document.getElementById("typingEl");

  if (currentConvId) reconnectSocket();

  function sendMessage() {
    var text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = "";
    addUserMessage(text);
    if (isEscalated && socket && currentTicketId) {
      socket.emit("send_message", { ticketId: currentTicketId, conversationId: currentConvId, message: text });
    } else {
      askBot(text);
    }
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function askBot(message) {
    setLoading(true); showTyping();
    fetch(API_BASE + "/api/chat/bot", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ companyId, sessionId, message })
    })
    .then(r => r.json())
    .then(data => {
      hideTyping(); setLoading(false);
      addBotMessage(data.reply);
      if (data.escalated) {
        currentConvId = data.conversationId;
        currentTicketId = data.ticketId;
        window.parent.postMessage({ type: "RAI_CONV_ID", conversationId: currentConvId }, "*");
        startSocket();
      }
    });
  }

  function startSocket() {
    document.getElementById("escalationBanner").style.display = "flex";
    isEscalated = true;
    socket = io(API_BASE, { query: { sessionId, companyId } });
    socket.on("connect", () => socket.emit("join_ticket", currentTicketId));
    socket.on("receive_message", data => addAgentMessage(data.message));
  }

  function reconnectSocket() { addSystemMessage("Welcome back!"); }

  function now() { return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); }

  function addBotMessage(text) {
    var wrap = createMsgWrap("bot", text, currentBotName.charAt(0));
    appendMsg(wrap);
  }
  function addUserMessage(text) {
    var wrap = createMsgWrap("user", text, "You");
    appendMsg(wrap);
  }
  function addAgentMessage(text) {
    var wrap = createMsgWrap("agent", text, "A");
    appendMsg(wrap);
  }
  function createMsgWrap(type, text, avatarChar) {
    var wrap = document.createElement("div");
    wrap.className = "msg " + type;
    var bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = parseMarkdown(text);
    var avatar = document.createElement("div");
    avatar.className = "msg-avatar";
    avatar.textContent = avatarChar;
    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    return wrap;
  }
  function addSystemMessage(text) {
    var div = document.createElement("div");
    div.style.cssText = "text-align:center;font-size:11px;color:var(--muted);padding:4px";
    div.textContent = text;
    appendMsg(div);
  }
  function appendMsg(el) { messagesEl.appendChild(el); messagesEl.scrollTop = messagesEl.scrollHeight; }
  function showTyping() { typingEl.style.display = "flex"; }
  function hideTyping() { typingEl.style.display = "none"; }
  function setLoading(v) { sendBtn.disabled = v; }
  function closeWidget() { window.parent.postMessage({ type: "RAI_CLOSE" }, "*"); }

  function escapeHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
  function parseMarkdown(text) {
    var lines = String(text).split("\n");
    var html = "";
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (/^#{1,6}\s+/.test(line)) {
        html += "<p style='font-weight:700;margin:8px 0 2px'>" + inlineFormat(line.replace(/^#{1,6}\s+/, "")) + "</p>";
      } else if (/^[-*]\s+/.test(line)) {
        html += "<li style='margin:2px 0 2px 14px'>" + inlineFormat(line.replace(/^[-*]\s+/, "")) + "</li>";
      } else if (line.trim() === "") {
        html += "<div style='height:6px'></div>";
      } else {
        html += "<p style='margin:2px 0'>" + inlineFormat(line) + "</p>";
      }
    }
    return html;
  }
  function inlineFormat(str) {
    str = escapeHtml(str);
    str = str.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    str = str.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, "<em>$1</em>");
    return str;
  }
</script>
</body>
</html>
